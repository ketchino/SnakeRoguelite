<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Roguelite</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=194">
</head>
<body>
    <div id="splash-screen">
        <div id="splash-content">
            <div id="splash-logo">🐍</div>
            <div id="splash-title">SNAKE ROGUELITE</div>

            <div id="splash-tap">PREMI UN TASTO O TOCCA OVUNQUE PER INIZIARE</div>
        </div>
    </div>
    <div id="menu-screen">
        <div id="menu-content"></div>
    </div>
    <div id="zone-bar">
        <div id="zone-bar-header">
            <div>
                <span id="zone-num">ZONA 1</span>
                <span id="zone-name">L'ALBERO DI MELE</span>
            </div>
            <span id="zone-next-txt">0/8</span>
        </div>
        <div id="zone-progress-wrap">
            <div id="zone-progress"></div>
        </div>
    </div>
    <div id="run-timer">⏱️ 0:00</div>

    <div id="main-view">
        <!-- Pannello reliquie a sinistra della mappa (visibile solo in pausa) -->
        <div id="pause-relic-panel">
            <div class="prp-header">
                <h2>🛡️ RELIQUIE</h2>
                <div class="prp-sub" id="prp-sub"></div>
            </div>
            <div class="prp-content" id="prp-content"></div>
        </div>
        <div id="game-col">
            <div id="game-container">
                <canvas id="gc" width="300" height="300"></canvas>
                <div id="overlay">
                    <div id="overlay-content"></div>
                </div>
                <div id="zone-banner">
                    <div id="banner-num">ZONA 1</div>
                    <div id="banner-name">L'ALBERO DI MELE</div>
                </div>
            </div>
            <div id="ost-ticker" aria-hidden="true"></div>
        </div>
        <div id="side-panel">
            <div id="hud">
                <div class="stat">LV <b id="hlv">1</b></div>
                <div class="stat">XP <b id="hxp">0/5</b></div>
                <div class="stat">MELE <b id="hsc">0</b></div>
                <div class="stat">HP <b id="hhp">3</b></div>
                <div class="stat" id="link-s" style="display:none">LINK <b id="link-st">ATTIVO</b></div>
                <div class="stat" id="kunai-s" style="display:none">KUNAI <b id="kunai-st">PRONTO</b></div>
                <div class="stat" id="frammento-s" style="display:none">VUOTO <b id="frammento-st">PRONTO</b></div>
            </div>
            <div id="relic-divider"></div>
            <div id="relic-bar"></div>
        </div>
    </div>
    <div id="touch-hint">DOPPIO TAP = PAUSA</div>

    <!-- Splash screen handler (must run before other scripts) -->
    <script>
    (function() {
        var splashDismissed = false;
        function dismissSplash(e) {
            if (splashDismissed) return;
            splashDismissed = true;
            // Blocca la propagazione dell'evento per evitare che il tasto
            // venga intercettato anche dal keyboard handler del gioco
            if (e && e.stopPropagation) e.stopPropagation();
            if (e && e.preventDefault) e.preventDefault();
            var el = document.getElementById('splash-screen');
            if (el) el.classList.add('hidden');
            // Rimuovi subito i listener — lo splash è stato chiuso
            document.removeEventListener('keydown', dismissSplash, true);
            document.removeEventListener('click', dismissSplash);
            document.removeEventListener('touchstart', dismissSplash);
        }
        // Chiudi splash con qualsiasi tasto (capture phase per intercettare prima del gioco)
        document.addEventListener('keydown', dismissSplash, true);
        // Chiudi splash con click o tocco ovunque
        document.addEventListener('click', dismissSplash);
        document.addEventListener('touchstart', dismissSplash);
        // Rimuovi i listener dopo 10 secondi come fallback
        setTimeout(function() {
            document.removeEventListener('keydown', dismissSplash, true);
            document.removeEventListener('click', dismissSplash);
            document.removeEventListener('touchstart', dismissSplash);
        }, 10000);
    })();
    </script>

    <!-- 1. Dati puri -->
    <script src="data/constants.js?v=194"></script>
    <script src="data/codex-db.js?v=194"></script>

    <!-- 5. Entità -->
    <script src="entities/enemies.js?v=194"></script>

    <script src="systems/codex.js?v=194"></script>
